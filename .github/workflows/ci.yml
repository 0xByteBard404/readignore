name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }} / Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # go-git v5.19.1 要求 go 1.25，须与 go.mod 的 go 1.25.0 对齐。
        go-version: ['1.25']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Tidy modules
        run: make tidy

      - name: Build
        run: make build

      - name: Test
        run: make test

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # 与 build-test 矩阵一致：go-git v5.19.1 要求 go 1.25。
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        # 不用 golangci-lint-action：其 install-mode: go install 在 v4 仍下载预编译 binary
        # （Go 1.24 build），不支持 Go 1.25 target。改为手动 go install，用 setup-go 的
        # Go 1.25 从源码编译 golangci-lint，确保 binary 是 Go 1.25 build，能 lint Go 1.25。
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout 5m
